name: Update models.dev

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update fallback catalog
        run: npm run update:models-dev

      - name: Detect catalog changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/models-dev-fallback.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: npm version patch --no-git-tag-version

      - name: Run checks
        if: steps.changes.outputs.changed == 'true'
        run: npm run check

      - name: Verify package contents
        if: steps.changes.outputs.changed == 'true'
        run: npm pack --dry-run

      - name: Commit and push update
        if: steps.changes.outputs.changed == 'true'
        id: release
        shell: bash
        run: |
          version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/models-dev-fallback.json package.json package-lock.json
          git commit -m "chore: update models.dev fallback (v${version})"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Pushes made with GITHUB_TOKEN do not start push workflows, so dispatch
      # the release workflow explicitly after the automated version bump.
      - name: Start release workflow
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --ref "${GITHUB_REF_NAME}"

      - name: Summary
        shell: bash
        run: |
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "Updated the fallback catalog and requested release v${{ steps.release.outputs.version }}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "models.dev fallback is already current." >> "$GITHUB_STEP_SUMMARY"
          fi
