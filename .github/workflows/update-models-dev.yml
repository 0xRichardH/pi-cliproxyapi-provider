name: Update models.dev and publish

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pi-cliproxyapi-provider-npm-publish
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update fallback catalog
        run: npm run update:models-dev

      - name: Detect catalog changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/models-dev-fallback.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: npm version patch --no-git-tag-version

      - name: Run checks
        if: steps.changes.outputs.changed == 'true'
        run: npm run check

      - name: Verify package contents
        if: steps.changes.outputs.changed == 'true'
        run: npm pack --dry-run

      - name: Commit and push release
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/models-dev-fallback.json package.json package-lock.json
          git commit -m "chore: update models.dev fallback (v${version})"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Detect unpublished automatic release
        id: release
        shell: bash
        run: |
          version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"
          published="$(npm view "pi-cliproxyapi-provider@${version}" version 2>/dev/null || true)"
          last_subject="$(git log -1 --pretty=%s)"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ -z "$published" && "$last_subject" == chore:\ update\ models.dev\ fallback* ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify pending release
        if: steps.release.outputs.publish == 'true' && steps.changes.outputs.changed != 'true'
        run: npm run check && npm pack --dry-run

      - name: Publish package
        if: steps.release.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          if [[ "${{ steps.release.outputs.publish }}" == "true" ]]; then
            echo "Published pi-cliproxyapi-provider@${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "Updated the fallback catalog, but version ${{ steps.release.outputs.version }} was already present on npm." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "models.dev fallback and npm are already current." >> "$GITHUB_STEP_SUMMARY"
          fi
