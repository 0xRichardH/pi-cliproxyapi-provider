name: Update models.dev and publish

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pi-cliproxyapi-provider-npm-publish
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Find unpublished automatic release
        id: pending
        shell: bash
        run: |
          publish=false
          release_sha=""
          version=""

          while read -r sha; do
            candidate="$(git show "${sha}:package.json" | node --input-type=module -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version));")"
            published="$(npm view "pi-cliproxyapi-provider@${candidate}" version 2>/dev/null || true)"
            if [[ -z "$published" ]]; then
              publish=true
              release_sha="$sha"
              version="$candidate"
              break
            fi
          done < <(git log --all --format=%H --grep='^chore: update models.dev fallback (v[0-9].*)$' --reverse)

          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out pending release
        if: steps.pending.outputs.publish == 'true'
        run: git checkout --detach "${{ steps.pending.outputs.release_sha }}"

      - name: Install pending release dependencies
        if: steps.pending.outputs.publish == 'true'
        run: npm ci

      - name: Verify pending release
        if: steps.pending.outputs.publish == 'true'
        run: npm run check && npm pack --dry-run

      - name: Publish pending release
        if: steps.pending.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update fallback catalog
        if: steps.pending.outputs.publish != 'true'
        run: npm run update:models-dev

      - name: Detect catalog changes
        if: steps.pending.outputs.publish != 'true'
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/models-dev-fallback.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: npm version patch --no-git-tag-version

      - name: Run checks
        if: steps.changes.outputs.changed == 'true'
        run: npm run check

      - name: Verify package contents
        if: steps.changes.outputs.changed == 'true'
        run: npm pack --dry-run

      - name: Commit and push release
        if: steps.changes.outputs.changed == 'true'
        id: release
        shell: bash
        run: |
          version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/models-dev-fallback.json package.json package-lock.json
          git commit -m "chore: update models.dev fallback (v${version})"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish new release
        if: steps.changes.outputs.changed == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          if [[ "${{ steps.pending.outputs.publish }}" == "true" ]]; then
            echo "Published pending pi-cliproxyapi-provider@${{ steps.pending.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "Published pi-cliproxyapi-provider@${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "models.dev fallback and npm are already current." >> "$GITHUB_STEP_SUMMARY"
          fi
